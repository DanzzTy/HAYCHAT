<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HAYAPP Chat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#202c33;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#chat{
flex:1;
padding:10px;
overflow-y:auto;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
}

.me{
background:#005c4b;
color:white;
margin-left:auto;
}

.other{
background:#202c33;
color:white;
}

.bottom{
display:flex;
padding:10px;
background:#202c33;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
background:#2a3942;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:50%;
background:#25D366;
color:white;
}
</style>

</head>

<body>

<div class="header">
<div>
<b id="nama"></b>
</div>
<button onclick="logout()">Logout</button>
</div>

<div id="chat"></div>

<div class="bottom">
<input id="pesan" placeholder="Ketik pesan...">
<button onclick="kirim()">➤</button>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

let userEmail = "";

onAuthStateChanged(auth, (user) => {
  if (!user) {
    location.href = "index.html";
  } else {
    userEmail = user.email;
    document.getElementById("nama").innerText = user.email;
    loadChat();
  }
});

// KIRIM PESAN
window.kirim = async function () {
  let pesan = document.getElementById("pesan").value;
  if (!pesan) return;

  await addDoc(collection(db, "chat"), {
    text: pesan,
    sender: userEmail,
    time: Date.now()
  });

  document.getElementById("pesan").value = "";
};

// LOAD CHAT REALTIME
function loadChat() {
  const q = query(collection(db, "chat"), orderBy("time"));

  onSnapshot(q, (snapshot) => {
    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    snapshot.forEach((doc) => {
      let data = doc.data();

      let div = document.createElement("div");
      div.classList.add("msg");

      if (data.sender === userEmail) {
        div.classList.add("me");
      } else {
        div.classList.add("other");
      }

      div.innerText = data.text;
      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  });
}

// LOGOUT
window.logout = function () {
  signOut(auth);
};
</script>

</body>
</html>
