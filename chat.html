<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HAYCHAT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111b21;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
height:60px;
background:#202c33;
display:flex;
align-items:center;
padding:0 15px;
color:white;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:12px;
}

.chat{
flex:1;
overflow:auto;
padding:15px;
background:#0b141a;
}

.msg-me{
background:#005c4b;
color:white;
padding:10px;
border-radius:10px;
margin:8px 0;
margin-left:auto;
width:max-content;
max-width:75%;
}

.msg-you{
background:#202c33;
color:white;
padding:10px;
border-radius:10px;
margin:8px 0;
width:max-content;
max-width:75%;
}

.bottom{
display:flex;
padding:10px;
background:#202c33;
}

.bottom input{
flex:1;
padding:12px;
border:none;
border-radius:30px;
background:#2a3942;
color:white;
}

.bottom button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:50%;
background:#25D366;
font-size:18px;
}
</style>
</head>

<body>

<div class="header">

<div class="avatar" id="avatar"></div>

<div>
<b id="nama"></b><br>
<small>Online</small>
</div>

</div>

<div class="chat" id="chat">

<div class="msg-you">
Halo 👋 Selamat datang di HAYAPP
</div>

</div>

<div class="bottom">

<input id="pesan" placeholder="Ketik pesan...">

<button onclick="kirim()">➤</button>

</div>

<script>

let nama=localStorage.getItem("nama")||"User";

document.getElementById("nama").innerHTML=nama;

document.getElementById("avatar").innerHTML=nama.charAt(0).toUpperCase();

function kirim(){

let pesan=document.getElementById("pesan");

if(pesan.value=="") return;

let chat=document.getElementById("chat");

chat.innerHTML+=`
<div class="msg-me">
${pesan.value}
</div>
`;

setTimeout(()=>{

chat.innerHTML+=`
<div class="msg-you">
Pesan diterima 👍
</div>
`;

chat.scrollTop=chat.scrollHeight;

},600);

pesan.value="";

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
  </html>
