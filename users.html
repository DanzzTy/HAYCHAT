<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HAY CHAT - Users</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:white;
}

.header{
padding:15px;
background:#202c33;
font-size:18px;
}

.user{
padding:15px;
border-bottom:1px solid #2a3942;
cursor:pointer;
}

.user:hover{
background:#202c33;
}
</style>
</head>

<body>

<div class="header">
👥 Pilih Teman Chat
</div>

<div id="list"></div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "index.html";
    return;
  }

  const snap = await getDocs(collection(db, "users"));

  let list = document.getElementById("list");
  list.innerHTML = "";

  let count = 0;

  snap.forEach((docu) => {
    let data = docu.data();
    count++;

    let div = document.createElement("div");
    div.innerText = data.nama || data.email;

    div.onclick = () => {
      let room = [data.email, user.email].sort().join("_");
      localStorage.setItem("room", room);
      location.href = "chat.html";
    };

    list.appendChild(div);
  });

  // kalau benar-benar kosong
  if (count === 0) {
    list.innerHTML = "<div style='padding:15px;color:gray'>Belum ada user</div>";
  }
});
</script>

</body>
</html>
