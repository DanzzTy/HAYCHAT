<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HAYAPP - Daftar</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:360px;
background:#202c33;
padding:30px;
border-radius:20px;
}

.logo{
font-size:55px;
text-align:center;
margin-bottom:10px;
}

h1{
text-align:center;
color:#25D366;
margin-bottom:10px;
}

p{
text-align:center;
color:#bbb;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:10px;
background:#2a3942;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#25D366;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:20px;
color:#25D366;
text-decoration:none;
}

#status{
margin-top:15px;
text-align:center;
color:#25D366;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">💬</div>

<h1>Daftar HAYAPP</h1>

<p>Buat akun baru</p>

<input id="nama" placeholder="Nama Lengkap">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="daftar()">
DAFTAR
</button>

<div id="status"></div>

<a href="index.html">
Sudah punya akun? Login
</a>

</div>

<script>

function daftar(){

let nama=document.getElementById("nama").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(nama==""||email==""||password==""){
status.innerHTML="Lengkapi semua data!";
return;
}

// Nanti bagian ini diganti Firebase
localStorage.setItem("nama",nama);
localStorage.setItem("email",email);
localStorage.setItem("password",password);

status.innerHTML="✅ Akun berhasil dibuat!";

setTimeout(()=>{
location.href="index.html";
},1500);

}

</script>

</body>
</html>
